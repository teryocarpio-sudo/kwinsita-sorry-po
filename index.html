<!DOCTYPE html>
<html>
<head>
<title>For My Kwinsita 🤍</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 0;
  background: #0e0e0e;
  color: white;
  font-family: 'Georgia', serif;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  animation: fadeIn 2s ease-in-out;
}

h1 {
  font-weight: 300;
  letter-spacing: 4px;
}

button {
  margin-top: 40px;
  padding: 12px 35px;
  background: transparent;
  border: 1px solid white;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.4s;
}

button:hover {
  background: white;
  color: black;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* Floating Hearts */
.heart {
  position: absolute;
  color: rgba(255,255,255,0.4);
  animation: float 8s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Hi, Kwinsita 🤍</h1>
  <p>I made this for you.</p>
  <button onclick="location.href='love.html'">Click Here</button>
</div>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "♡";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 15 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 8000);
}

setInterval(createHeart, 600);
</script>

</body>
</html>
